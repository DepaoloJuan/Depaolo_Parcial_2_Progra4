<app-navbar />

<div class="container py-4">
  <h4 class="fw-bold mb-4">Dashboard — Estadísticas</h4>

  <!-- Selector de fechas -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Desde</label>
          <input type="date" class="form-control"
            [value]="desde()"
            (change)="desde.set($any($event.target).value)">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Hasta</label>
          <input type="date" class="form-control"
            [value]="hasta()"
            (change)="hasta.set($any($event.target).value)">
        </div>
        <div class="col-md-4">
          <button class="btn btn-primary w-100" (click)="cargarEstadisticas()" [disabled]="cargando()">
            {{ cargando() ? 'Cargando...' : 'Actualizar gráficos' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  @if (cargando()) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary"></div>
    </div>
  } @else {
    <div class="row g-4">

      <!-- Gráfico 1: Publicaciones por usuario (barras) -->
      <div class="col-md-6">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h6 class="fw-bold mb-3">Publicaciones por usuario</h6>
            <canvas #graficoPublicaciones></canvas>
          </div>
        </div>
      </div>

      <!-- Gráfico 2: Comentarios por día (líneas) -->
      <div class="col-md-6">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h6 class="fw-bold mb-3">Comentarios por día</h6>
            <canvas #graficoComentariosTiempo></canvas>
          </div>
        </div>
      </div>

      <!-- Gráfico 3: Comentarios por publicación (torta) -->
      <div class="col-12">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="fw-bold mb-3">Comentarios por publicación</h6>
            <div style="max-width: 500px; margin: 0 auto;">
              <canvas #graficoComentariosPublicacion></canvas>
            </div>
          </div>
        </div>
      </div>

    </div>
  }
</div>
